<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김겸 & 황주애 모바일 청첩장</title>
    <meta property="og:title" content="김겸 & 황주애 모바일 청첩장">
    <meta property="og:description" content="26.09.19 저희의 결혼식에 초대합니다.">
    <meta property="og:image" content="1_2.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        :root { --bg-light: #f8f7f4; --text-dark: #333333; --text-muted: #888888; --point-color: #b5a695; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
        }

        .invitation-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            height: 100vh;
            overflow-y: scroll;
            /* 핵심: 스크롤 스냅(페이지 단위 넘김) */
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* 부드러운 페이드 전환을 위한 준비 */
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }

        /* --- 나머지 스타일 동일 --- */
        #bgm-btn { position: fixed; top: 20px; right: 20px; z-index: 100; cursor: pointer; }
        .section-greeting { background-color: var(--bg-light); padding: 40px; text-align: center; }
        .highlight-name { font-weight: 600; color: var(--point-color); font-size: 1.1em; }
        
        /* 갤러리 섹션 */
        .section-gallery { background: #fff; padding: 40px; text-align: center; }
        .gallery-grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .gallery-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* 모달 스타일은 이전과 동일 */
        .modal { display: none; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; height: 100vh; background: #fff; z-index: 9999; }
    </style>
</head>
<body>

<div class="invitation-container" id="container">
    <div class="page" id="page1" style="background: url('1_2.jpg') center/cover;">
        </div>
    
    <div class="page" id="page2">
        </div>

    <div class="page" id="page3">
        </div>

    <div class="page" id="page4">
        </div>

    <div class="page" id="page5">
        </div>
</div>

<script>
    // 스크롤 시 페이지별 페이드 효과
    const container = document.getElementById('container');
    const pages = document.querySelectorAll('.page');

    container.addEventListener('scroll', () => {
        pages.forEach(page => {
            const rect = page.getBoundingClientRect();
            // 화면 중심에 들어오면 불투명도 조절
            if (rect.top >= -200 && rect.top <= 200) {
                page.style.opacity = '1';
            } else {
                page.style.opacity = '0.3'; // 넘어가는 페이지는 살짝 흐리게
            }
        });
    });
</script>
</body>
</html>
